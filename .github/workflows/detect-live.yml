      #     AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      #   run: |
      #     pip install awscli
      #     TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
      #     aws s3 cp live_streams.json s3://frontlines-processed/live-streams/snapshots/${TIMESTAMP}.json \
      #       --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
      #       --acl public-read || true
      #     aws s3 cp live_streams.json s3://frontlines-processed/live-streams/latest.json \
      #       --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
      #       --acl public-read || true
      #     aws s3 cp fused_hotspots.json s3://frontlines-processed/fused-intel/snapshots/${TIMESTAMP}.json \

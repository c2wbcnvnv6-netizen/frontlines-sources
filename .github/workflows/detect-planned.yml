name: Collect Planned Actions

on:
  schedule:
    # Less frequent than live streams (actions change slower)
    - cron: '0 */4 * * *'  # every 4 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run planned actions collector
        run: python scripts/collect_planned_actions.py

      - name: Commit updated planned_actions.json (git fallback)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/planned_actions.json
          git commit -m "chore: update planned actions from public calendars [skip ci]" || echo "No changes to commit"
          git push


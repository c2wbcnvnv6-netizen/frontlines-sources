name: Detect Live Streams

on:
  schedule:
    # Run every 15 minutes. With yt-dlp preferred (default), quota usage for detection is ~0.
    # Tune based on needs. API fallback path still notes the ~100 unit cost per YT search.
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger from Actions tab

permissions:
  contents: write   # Needed to commit or prepare uploads

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies + yt-dlp + ffmpeg (hardened detection, richer metadata, future stream archiving support)
        run: |
          pip install -r requirements.txt
          python -m pip install -U yt-dlp
          # ffmpeg useful for yt-dlp stream capture / post-processing if extended later
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg || true
          echo "yt-dlp version: $(yt-dlp --version || python3 -c 'import yt_dlp; print(yt_dlp.version.__version__)' || echo 'unavailable')"

      - name: Run live stream detector (yt-dlp preferred when present)
        run: python scripts/auto_detect_live_v2.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Recommended for full fallback functionality (not needed if yt-dlp handles Twitch/YouTube live checks):
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          USE_YT_DLP: '1'
          # Optional: set to '1' to persist full yt-dlp info.json snapshots (useful for later yt-dlp --load-info-json, Whisper transcripts, or archiving pipelines)
          # ARCHIVE_STREAM_META: '1'
          # TWITCH_EMBED_PARENT: infiltruth.com   # override if embedding player elsewhere

      - name: Run intel fusion (correlate live_streams + planned_actions -> fused_hotspots)
        run: python scripts/fuse_intel.py

      - name: Commit updated live_streams.json + fused_hotspots.json (and archives/ if produced)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_streams.json fused_hotspots.json
          git add stream_archives/ 2>/dev/null || true
          git commit -m "chore: update live streams + fused hotspots from detector+fusion [skip ci]" || echo "No changes to commit"
          git push

      # Full stack: GitHub Actions (15m live + 4h planned) + Cloudflare R2 (frontlines-processed/live-streams/ + /fused-intel/ + /planned-actions/ when secrets).
      # See data/README.md and detect-planned.yml. R2 steps ready (uncomment + add secrets per CF subagent).
      # - name: Upload to Cloudflare R2 (frontlines-processed/live-streams/ + fused-intel/)
      #   if: always()
